<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h2>Tip Calculator</h2>

    <label for="bill">Bill Amount (Rs)</label>
    <input type="number" id="bill" placeholder="Enter bill amount" min="0" />
    <p class="error" id="bill-error"></p>

    <label>Tip Percentage</label>
    <div class="tip-buttons">
      <button class="tip-btn" onclick="selectTip(10, this)">10%</button>
      <button class="tip-btn active" onclick="selectTip(15, this)">15%</button>
      <button class="tip-btn" onclick="selectTip(20, this)">20%</button>
    </div>
    <br>
    <input type="number" id="custom-tip" placeholder="Or enter custom %" min="0" max="100" />
    <p class="error" id="tip-error"></p>

    <label for="people">Number of People</label>
    <input type="number" id="people" placeholder="Enter number of people" min="1" />
    <p class="error" id="people-error"></p>

    <div class="results">
      <div class="result-row">
        <span>Tip Amount:</span>
        <span id="tip-amount">Rs 0.00</span>
      </div>
      <div class="result-row">
        <span>Grand Total:</span>
        <span id="grand-total">Rs 0.00</span>
      </div>
      <div class="result-row">
        <span>Per Person:</span>
        <span id="per-person">Rs 0.00</span>
      </div>
    </div>

    <button class="reset-btn" onclick="resetAll()">Reset</button>
    <button class="submit-btn" onclick="alert('Thank you for Tip')">Submit</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
